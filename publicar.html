<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Imóvel - ArrendAngola</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<header>
    <div class="header-container">
        <div class="logo">
            <h1>Arrend<span>Angola</span></h1>
        </div>
        <div class="nav-menu">
            <a href="index.html">Início</a>
            <a href="buscar.html">Buscar Imóveis</a>
            <a href="publicar.html">Publicar Imóvel</a>
            <a href="sobre.html">Sobre</a>
            <a href="login.html" class="btn-cadastro">Entrar</a>
        </div>
    </div>
</header>

<div class="form-container">
    <h2 style="color: #1e3c72; margin-bottom: 1rem;"> Publicar Imóvel</h2>
    <p style="margin-bottom: 2rem;">Preencha os dados abaixo para anunciar seu imóvel</p>
<form id="formPublicar">
    <div class="form-group">
        <label>Tipo de negócio *</label>
        <select id="tipo_negocio" required>
            <option value="">Selecione</option>
            <option>Arrendamento</option>
            <option>Venda</option>
        </select>
    </div>

    <div class="form-group">
        <label>Preço (Kz) *</label>
        <input type="number" id="preco" placeholder="Ex: 450000" required>
    </div>

    <div class="form-group">
        <label>Província *</label>
        <select id="provincia" required>
            <option value="">Selecione a província</option>
            <option>Bengo</option><option>Benguela</option><option>Bié</option>
            <option>Cabinda</option><option>Cuando Cubango</option><option>Cuanza Norte</option>
            <option>Cuanza Sul</option><option>Cunene</option><option>Huambo</option>
            <option>Huíla</option><option>Luanda</option><option>Lunda Norte</option>
            <option>Lunda Sul</option><option>Malanje</option><option>Moxico</option>
            <option>Namibe</option><option>Uíge</option><option>Zaire</option>
        </select>
    </div>

    <div class="form-group">
        <label>Município/Bairro *</label>
        <input type="text" id="bairro" placeholder="Ex: Ingombota" required>
    </div>

    <div class="form-group">
        <label>Número de telefone *</label>
        <input type="tel" id="telefone" placeholder="Ex: 923 456 789" required>
    </div>

    <div class="form-group">
        <label>Descrição do imóvel *</label>
        <textarea id="descricao" rows="4" placeholder="Descreva detalhes..." required></textarea>
    </div>

    <button type="submit" class="btn-primary" style="width: 100%;">Publicar Imóvel</button>
</form>

<div id="mensagem" style="margin-top: 1rem; text-align: center;"></div>
</div>

<footer>
    <p>© 2026 ArrendAngola - Plataforma de imóveis em Angola. Uma iniciativa SMARTECH - António Lando Paulino.</p>
</footer>
    <script>
    document.getElementById('formPublicar').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const usuario = getUsuarioLogado();
        if (!usuario) {
            document.getElementById('mensagem').innerHTML = '<span style="color: red;">❌ Faça login primeiro!</span>';
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
            return;
        }
        
        const imovel = {
            tipo_negocio: document.getElementById('tipo_negocio').value,
            preco: parseFloat(document.getElementById('preco').value),
            provincia: document.getElementById('provincia').value,
            bairro: document.getElementById('bairro').value,
            descricao: document.getElementById('descricao').value,
            telefone_contato: document.getElementById('telefone').value
        };
        
        const resultado = await publicarImovel(imovel);
        
        if (resultado.sucesso) {
            document.getElementById('mensagem').innerHTML = '<span style="color: green;">✅ Imóvel publicado com sucesso!</span>';
            document.getElementById('formPublicar').reset();
        } else {
            document.getElementById('mensagem').innerHTML = '<span style="color: red;">❌ ' + resultado.erro + '</span>';
        }
    });
</script>

</body>
</html>
