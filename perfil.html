<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - ArrendAngola</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
    <div class="header-container">
        <div class="logo"><h1>Arrend<span>Angola</span></h1></div>
        <div class="nav-menu">
            <a href="index.html">Início</a>
            <a href="buscar.html">Buscar Imóveis</a>
            <a href="publicar.html">Publicar Imóvel</a>
            <a href="sobre.html">Sobre</a>
            <a href="#" id="btn-sair" class="btn-cadastro">Sair</a>
        </div>
    </div>
</header>

<main style="max-width: 800px; margin: 2rem auto; padding: 0 1rem;">
    <div style="background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        <h2 style="color: #1e3c72;">Meu Perfil</h2>
        <div id="perfil-info">
            <p><strong>Nome:</strong> <span id="perfil-nome">Carregando...</span></p>
            <p><strong>Email:</strong> <span id="perfil-email">Carregando...</span></p>
            <p><strong>Telefone:</strong> <span id="perfil-telefone">Carregando...</span></p>
            <p><strong>Província:</strong> <span id="perfil-provincia">Carregando...</span></p>
            <p><strong>Avaliação:</strong> <span id="perfil-avaliacao">Carregando...</span></p>
        </div>
    </div>
</main>

<script>
    const SUPABASE_URL = 'https://zabaauxkksqeuazpfxwi.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_ES7PHsEz96dQ12gWJ8xihw_P8NeAfH5';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Buscar usuário logado
    const usuarioSalvo = sessionStorage.getItem('usuario');
    
    if (!usuarioSalvo) {
        window.location.href = 'login.html';
    } else {
        const usuario = JSON.parse(usuarioSalvo);
        document.getElementById('perfil-nome').innerText = usuario.nome;
        document.getElementById('perfil-email').innerText = usuario.email;
        document.getElementById('perfil-telefone').innerText = usuario.telefone || 'Não informado';
        document.getElementById('perfil-provincia').innerText = usuario.provincia || 'Não informada';
        document.getElementById('perfil-avaliacao').innerHTML =  + (usuario.avaliacao_media || 0).toFixed(1);
    }

    // Botão sair
    document.getElementById('btn-sair').addEventListener('click', () => {
        sessionStorage.removeItem('usuario');
        window.location.href = 'index.html';
    });
</script>
    <script src="supabase.js"></script>
</body>
</html>
