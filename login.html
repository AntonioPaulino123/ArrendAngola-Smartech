<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - ArrendAngola</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<header>
    <div class="header-container">
        <div class="logo">
            <h1>Arrend<span>Angola</span></h1>
        </div>
        <div class="nav-menu">
            <a href="index.html">Início</a>
            <a href="buscar.html">Buscar Imóveis</a>
            <a href="publicar.html">Publicar Imóvel</a>
            <a href="sobre.html">Sobre</a>
        </div>
    </div>
</header>

<div class="form-container" style="max-width: 500px;">
    <h2 style="color: #1e3c72; text-align: center;">Entrar na Conta</h2>
    <p style="text-align: center; margin-bottom: 2rem;">Acesse sua conta ArrendAngola</p>

    <form id="formLogin">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="senha" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%;">Entrar</button>
    </form>

    <div id="mensagem" style="margin-top: 1rem; text-align: center;"></div>

    <div style="text-align: center; margin-top: 2rem;">
        <p>Não tem conta? <a href="cadastro.html" style="color: #2b6cb0; font-weight: bold;">Criar conta gratuita</a></p>
    </div>
</div>

<footer>
    <p>© 2026 ArrendAngola - Plataforma de imóveis em Angola</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
    document.getElementById('formLogin').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        const mensagemDiv = document.getElementById('mensagem');
        
        mensagemDiv.innerHTML = '<span style="color: #2b6cb0;">Verificando...</span>';
        
        try {
            const { data, error } = await supabaseClient
                .from('usuarios')
                .select('*')
                .eq('email', email)
                .eq('senha', senha);
            
            if (error) {
                mensagemDiv.innerHTML = '<span style="color: #dc3545;">Erro ao fazer login</span>';
                return;
            }
            
            if (!data || data.length === 0) {
                mensagemDiv.innerHTML = '<span style="color: #dc3545;">Email ou senha incorretos</span>';
                return;
            }
            
            const usuario = data[0];
            sessionStorage.setItem('usuario', JSON.stringify(usuario));
            mensagemDiv.innerHTML = '<span style="color: #28a745;">Login realizado! Redirecionando...</span>';
            
            setTimeout(() => {
                window.location.href = 'perfil.html';
            }, 1500);
            
        } catch (erro) {
            mensagemDiv.innerHTML = '<span style="color: #dc3545;">Erro de conexão</span>';
            console.error(erro);
        }
    });
    
</script>
    <script src="supabase.js"></script>
</body>
</html>
