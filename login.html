<div class="form-container" style="max-width: 500px;">
    <h2 style="color: #1e3c72; text-align: center;">Entrar na Conta</h2>
    <p style="text-align: center; margin-bottom: 2rem;">Acesse sua conta ArrendAngola</p>

    <form>
        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" placeholder="••••••••" required>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <label style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox"> Lembrar-me
            </label>
            <a href="#" style="color: #2b6cb0;">Esqueceu a senha?</a>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%;">Entrar</button>
    </form>

    <div style="text-align: center; margin-top: 2rem;">
        <p>Não tem conta? <a href="cadastro.html" style="color: #2b6cb0; font-weight: bold;">Criar conta gratuita</a></p>
    </div>
</div>
