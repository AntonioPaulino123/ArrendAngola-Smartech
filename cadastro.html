<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - ArrendAngola</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
    <div class="header-container">
        <div class="logo"><h1>Arrend<span>Angola</span></h1></div>
        <div class="nav-menu">
            <a href="index.html">Início</a>
            <a href="buscar.html">Buscar Imóveis</a>
            <a href="publicar.html">Publicar Imóvel</a>
            <a href="sobre.html">Sobre</a>
            <a href="login.html" class="btn-cadastro">Entrar</a>
        </div>
    </div>
</header>

<div class="form-container" style="max-width: 600px;">
    <h2 style="color: #1e3c72; text-align: center;">Criar Conta</h2>
    <form id="formCadastro">
        <div class="form-group">
            <label>Nome completo</label>
            <input type="text" id="nome" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label>Telefone</label>
            <input type="tel" id="telefone" required>
        </div>
        <div class="form-group">
            <label>Província</label>
            <select id="provincia" required>
                <option value="">Selecione</option>
                <option>Luanda</option><option>Benguela</option><option>Huíla</option>
                <option>Huambo</option><option>Bié</option><option>Cabinda</option>
                <option>Zaire</option><option>Uíge</option><option>Malanje</option>
                <option>Lunda Norte</option><option>Lunda Sul</option><option>Cuanza Norte</option>
                <option>Cuanza Sul</option><option>Cuando Cubango</option><option>Cunene</option>
                <option>Namibe</option><option>Moxico</option><option>Bengo</option>
            </select>
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="senha" required>
        </div>
        <div class="form-group">
            <label>Confirmar senha</label>
            <input type="password" id="confirmarSenha" required>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">Cadastrar</button>
    </form>
    <div id="mensagem" style="margin-top: 1rem; text-align: center;"></div>
</div>

<script>
    const SUPABASE_URL = 'https://zabaauxkksqeuazpfxwi.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_ES7PHsEz96dQ12gWJ8xihw_P8NeAfH5';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('formCadastro').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const senha = document.getElementById('senha').value;
        const confirmar = document.getElementById('confirmarSenha').value;
        const msgDiv = document.getElementById('mensagem');
        
        if (senha !== confirmar) {
            msgDiv.innerHTML = '<span style="color: red;">Senhas não coincidem</span>';
            return;
        }
        
        msgDiv.innerHTML = '<span style="color: blue;">Cadastrando...</span>';
        
        const { data, error } = await supabase.from('usuarios').insert([{
            nome: document.getElementById('nome').value,
            email: document.getElementById('email').value,
            telefone: document.getElementById('telefone').value,
            provincia: document.getElementById('provincia').value,
            senha: senha
        }]).select();
        
        if (error) {
            msgDiv.innerHTML = '<span style="color: red;">Erro: ' + error.message + '</span>';
        } else if (data && data.length > 0) {
            msgDiv.innerHTML = '<span style="color: green;">Cadastro realizado! Redirecionando...</span>';
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        }
    });
</script>
</body>
</html>
